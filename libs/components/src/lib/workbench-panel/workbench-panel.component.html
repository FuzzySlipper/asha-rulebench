<section
  #panel
  class="panel"
  [class.panel--compact]="compact()"
  [class.panel--overlay-tools]="overlayTools()"
  [class.panel--small-title]="smallTitle()"
  role="region"
  tabindex="-1"
  [attr.aria-label]="panelNumber() + '. ' + panelTitle()"
>
  <header class="panel__header">
    <h2>{{ panelTitle() }}</h2>
    <div class="panel__tools"><ng-content select="[panelTools]" /></div>
  </header>
  <div
    class="panel__body"
    role="group"
    [attr.aria-label]="panelTitle() + ' contents'"
    [attr.tabindex]="compact() ? null : 0"
  >
    <ng-content />
  </div>
</section>
