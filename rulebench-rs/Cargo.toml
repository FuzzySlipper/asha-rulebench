[workspace]
members = ["hosts/ruleset-host"]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
rpg-compiler = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "e093562aa1ee497ec97e4c368e974485d5e5211f" }
rpg-ir = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "e093562aa1ee497ec97e4c368e974485d5e5211f" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tiny_http = "0.12"
ts-rs = { version = "11", features = ["serde-compat"] }
