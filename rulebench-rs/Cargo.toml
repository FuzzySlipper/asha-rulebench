[workspace]
members = ["hosts/ruleset-host"]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
rpg-compiler = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "dc752b4d5f626ff9af7130433bad68068c77c2df" }
rpg-core = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "dc752b4d5f626ff9af7130433bad68068c77c2df" }
rpg-ir = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "dc752b4d5f626ff9af7130433bad68068c77c2df" }
rpg-runtime = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "dc752b4d5f626ff9af7130433bad68068c77c2df" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tiny_http = "0.12"
ts-rs = { version = "11", features = ["serde-compat"] }
