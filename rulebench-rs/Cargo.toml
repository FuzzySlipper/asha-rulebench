[workspace]
resolver = "2"

members = [
    "crates/rulebench-bridge",
    "crates/rulebench-codegen",
    "crates/rulebench-combat",
    "crates/rulebench-content",
    "crates/rulebench-product-content",
    "crates/rulebench-protocol",
    "crates/rulebench-replay",
    "hosts/rulebench-process-host",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "UNLICENSED"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rpg-compiler = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "ea3e3803d4736268f2a10996a34bc5b8dfefcffc", version = "^0.1" }
rpg-core = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "ea3e3803d4736268f2a10996a34bc5b8dfefcffc", version = "^0.1" }
rpg-ir = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "ea3e3803d4736268f2a10996a34bc5b8dfefcffc", version = "^0.1" }
rpg-runtime = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "ea3e3803d4736268f2a10996a34bc5b8dfefcffc", version = "^0.1" }
