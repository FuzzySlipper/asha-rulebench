[workspace]
resolver = "2"

members = [
    "crates/rulebench-authority",
    "crates/rulebench-bridge",
    "crates/rulebench-codegen",
    "crates/rulebench-combat",
    "crates/rulebench-content",
    "crates/rulebench-core",
    "crates/rulebench-fixtures",
    "crates/rulebench-gameplay-module",
    "crates/rulebench-protocol",
    "crates/rulebench-replay",
    "crates/rulebench-rules",
    "crates/rulebench-ruleset",
    "hosts/rulebench-process-host",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "UNLICENSED"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
