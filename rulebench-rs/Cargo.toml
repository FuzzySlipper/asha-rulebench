[workspace]
members = ["hosts/play-host"]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
getrandom = "0.3"
rpg-compiler = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "6a7a2af41ab5c28acb38c399f1adb8df13c30839" }
rpg-core = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "6a7a2af41ab5c28acb38c399f1adb8df13c30839" }
rpg-ir = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "6a7a2af41ab5c28acb38c399f1adb8df13c30839" }
rpg-runtime = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "6a7a2af41ab5c28acb38c399f1adb8df13c30839" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tiny_http = "0.12"
ts-rs = { version = "11", features = ["serde-compat"] }
