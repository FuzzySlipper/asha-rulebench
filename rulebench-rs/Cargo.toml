[workspace]
resolver = "2"

members = [
    "crates/rulebench-authority",
    "crates/rulebench-bridge",
    "crates/rulebench-codegen",
    "crates/rulebench-combat",
    "crates/rulebench-content",
    "crates/rulebench-fixtures",
    "crates/rulebench-protocol",
    "crates/rulebench-replay",
    "crates/rulebench-rpg-adapter",
    "hosts/rulebench-process-host",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "UNLICENSED"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rpg-core = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "026889782c4e0b6e5f562ec78426a391269e0265", version = "^0.1" }
rpg-ir = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "026889782c4e0b6e5f562ec78426a391269e0265", version = "^0.1" }
rpg-runtime = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "026889782c4e0b6e5f562ec78426a391269e0265", version = "^0.1" }
