[workspace]
members = ["hosts/ruleset-host"]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
getrandom = "0.3"
rpg-compiler = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "d337701f68c3af116383ee2477c19d1aac15d034" }
rpg-core = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "d337701f68c3af116383ee2477c19d1aac15d034" }
rpg-ir = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "d337701f68c3af116383ee2477c19d1aac15d034" }
rpg-runtime = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "d337701f68c3af116383ee2477c19d1aac15d034" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tiny_http = "0.12"
ts-rs = { version = "11", features = ["serde-compat"] }
