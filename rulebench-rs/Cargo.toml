[workspace]
members = ["hosts/ruleset-host"]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
rpg-compiler = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "45058c4eed0ccabfa67b2d5b47a3f7f940c3e117" }
rpg-ir = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "45058c4eed0ccabfa67b2d5b47a3f7f940c3e117" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tiny_http = "0.12"
ts-rs = { version = "11", features = ["serde-compat"] }
