[workspace]
members = ["hosts/ruleset-host"]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
rpg-compiler = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "62e5a6feecf11f0109eb40627c5cafcf8ef786f2" }
rpg-ir = { git = "https://github.com/FuzzySlipper/asha-rpg.git", rev = "62e5a6feecf11f0109eb40627c5cafcf8ef786f2" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tiny_http = "0.12"
ts-rs = { version = "11", features = ["serde-compat"] }
